<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Masters IA - Login</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>🐉 Dragon Masters IA</h1>
      <p>Entre ou crie sua conta para jogar RPG online com seus amigos.</p>

      <h2>Google</h2>
      <button id="googleLoginBtn" class="google-btn">Entrar com Google</button>

      <div class="divider"></div>

      <h2>Email e senha</h2>
      <label>Nome da conta</label>
      <input id="playerName" placeholder="Ex: Kael" />

      <label>Email</label>
      <input id="emailInput" type="email" placeholder="seuemail@gmail.com" />

      <label>Senha</label>
      <input id="passwordInput" type="password" placeholder="mínimo 6 caracteres" />

      <button id="emailLoginBtn">Entrar</button>
      <button id="emailRegisterBtn" class="secondary-btn">Criar conta</button>

      <div class="divider"></div>

      <h2>Entrada rápida</h2>
      <label>Nome da conta</label>
      <input id="guestName" placeholder="Ex: Thorin" />
      <button id="guestLoginBtn">Entrar sem conta</button>

      <p id="statusText" class="status"></p>
    </section>
  </main>

  <script type="module" src="./js/background-music.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
